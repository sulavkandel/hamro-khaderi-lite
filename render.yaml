services:
  - type: web
    name: hamro-khaderi-api
    env: docker
    dockerfilePath: deploy/Dockerfile.backend
    rootDir: .
    plan: free
    healthCheckPath: /api/v1/health/
    envVars:
      - key: POSTGRES_DB
        fromDatabase:
          name: hamro-khaderi-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: hamro-khaderi-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: hamro-khaderi-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: hamro-khaderi-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: hamro-khaderi-db
          property: port
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: SCHEDULER_AUTOSTART
        value: "1"

databases:
  - name: hamro-khaderi-db
    plan: free
    databaseName: khaderi
    user: khaderi
